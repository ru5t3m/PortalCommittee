services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: knb
      POSTGRES_USER: knb
      POSTGRES_PASSWORD: knb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knb"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/api
    environment:
      DATABASE_URL: postgresql+psycopg://knb:knb@postgres:5432/knb
      JWT_SECRET: change-this-secret
      CORS_ORIGINS: '["http://localhost:3000"]'
      ALLOWED_HOSTS: '["localhost","127.0.0.1","api"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build: ./apps/web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
